<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — TechShop</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <a href="index.html" class="auth-logo">⚡ TechShop</a>
    <h2>Добро пожаловать!</h2>
    <p class="auth-sub">Войдите в свой аккаунт</p>

    <div class="alert alert-error" id="alert-error"></div>
    <div class="alert alert-success" id="alert-success"></div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Логин</label>
        <input type="text" id="username" name="username" placeholder="Введите логин" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" placeholder="Введите пароль" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-submit">Войти</button>
    </form>

    <div class="auth-switch">
      Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
    </div>
    <div class="auth-switch" style="margin-top:0.5rem;">
      <a href="index.html">← Вернуться в магазин</a>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/auth.js"></script>
<script>
  if (Auth.getCurrentUser()) window.location.href = 'index.html';

  function showAlert(type, msg) {
    document.getElementById('alert-error').classList.remove('show');
    document.getElementById('alert-success').classList.remove('show');
    const el = document.getElementById('alert-' + type);
    el.textContent = msg;
    el.classList.add('show');
  }

  function handleLogin(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      showAlert('error', 'Заполните все поля');
      return;
    }

    const result = Auth.login(username, password);
    if (!result.ok) {
      showAlert('error', result.error);
      return;
    }

    showAlert('success', `Добро пожаловать, ${result.user.username}! Перенаправление…`);
    setTimeout(() => {
      window.location.href = result.user.role === 'admin' ? 'admin.html' : 'index.html';
    }, 800);
  }
</script>
</body>
</html>
