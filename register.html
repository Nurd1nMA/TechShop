<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — TechShop</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <a href="index.html" class="auth-logo">⚡ TechShop</a>
    <h2>Создать аккаунт</h2>
    <p class="auth-sub">Зарегистрируйтесь, чтобы делать покупки</p>

    <div class="alert alert-error"   id="alert-error"></div>
    <div class="alert alert-success" id="alert-success"></div>

    <form id="reg-form" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label for="fullname">Полное имя</label>
        <input type="text" id="fullname" name="fullname" placeholder="Иван Иванов" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="example@mail.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="username">Логин</label>
        <input type="text" id="username" name="username" placeholder="Минимум 3 символа" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" placeholder="Минимум 6 символов" required autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="password2">Повторите пароль</label>
        <input type="password" id="password2" name="password2" placeholder="Введите пароль ещё раз" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn-submit">Зарегистрироваться</button>
    </form>

    <div class="auth-switch">
      Уже есть аккаунт? <a href="login.html">Войти</a>
    </div>
    <div class="auth-switch" style="margin-top:0.5rem;">
      <a href="index.html">← Вернуться в магазин</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/auth.js"></script>
<script>
  if (Auth.getCurrentUser()) window.location.href = 'index.html';

  function showAlert(type, msg) {
    document.getElementById('alert-error').classList.remove('show');
    document.getElementById('alert-success').classList.remove('show');
    const el = document.getElementById('alert-' + type);
    el.textContent = msg;
    el.classList.add('show');
  }

  function handleRegister(e) {
    e.preventDefault();
    const fullname  = document.getElementById('fullname').value.trim();
    const email     = document.getElementById('email').value.trim();
    const username  = document.getElementById('username').value.trim();
    const password  = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;

    if (username.length < 3) { showAlert('error', 'Логин должен содержать минимум 3 символа'); return; }
    if (password.length < 6) { showAlert('error', 'Пароль должен содержать минимум 6 символов'); return; }
    if (password !== password2) { showAlert('error', 'Пароли не совпадают'); return; }

    const result = Auth.register({ fullname, email, username, password });
    if (!result.ok) { showAlert('error', result.error); return; }

    showAlert('success', 'Регистрация прошла успешно! Перенаправление на вход…');
    document.getElementById('reg-form').reset();
    setTimeout(() => window.location.href = 'login.html', 1500);
  }
</script>
</body>
</html>
