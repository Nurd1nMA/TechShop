<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Панель администратора — TechShop</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="admin-wrap">

  <aside class="admin-side">
    <div class="admin-side-logo">⚡ Tech<span>Shop</span></div>
    <nav class="admin-nav">
      <button data-panel="dashboard" onclick="showPanel('dashboard')">📊 Дашборд</button>
      <button data-panel="products"  onclick="showPanel('products')">📦 Товары</button>
      <button data-panel="users"     onclick="showPanel('users')">👥 Пользователи</button>
      <button onclick="window.location.href='index.html'" style="margin-top:auto;">🏠 На сайт</button>
    </nav>
  </aside>

  <main class="admin-main">
    <div class="admin-top">
      <h1>Панель администратора</h1>
      <div class="admin-user-badge">
        <span id="admin-username">👑 admin</span>
        <a href="#" onclick="Auth.logout()">Выйти</a>
      </div>
    </div>

    <section class="admin-panel" id="panel-dashboard">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-val" id="stat-products">0</div>
          <div class="stat-lbl">📦 Товаров в каталоге</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-users">0</div>
          <div class="stat-lbl">👥 Пользователей</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-cart">0</div>
          <div class="stat-lbl">🛒 Товаров в корзинах</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="stat-total">0 сом</div>
          <div class="stat-lbl">💰 Сумма в корзинах</div>
        </div>
      </div>

    </section>

    <section class="admin-panel" id="panel-products">
      <div class="admin-box">
        <div class="admin-box-head">
          <h3>📦 Управление товарами</h3>
          <button class="btn-add" onclick="openAddModal()">+ Добавить товар</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>Название</th>
              <th>Категория</th>
              <th>Цена</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="products-tbody">
            <tr><td colspan="4" style="text-align:center;padding:2rem;color:var(--muted);">Загрузка…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="admin-panel" id="panel-users">
      <div class="admin-box">
        <div class="admin-box-head">
          <h3>👥 Зарегистрированные пользователи</h3>
        </div>
        <table>
          <thead>
            <tr>
              <th>Логин</th>
              <th>Email</th>
              <th>Полное имя</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <tr><td colspan="3" style="text-align:center;padding:2rem;color:var(--muted);">Загрузка…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>
</div>

<div class="modal-bg" id="add-modal">
  <div class="modal">
    <h3>➕ Добавить новый товар</h3>
    <form id="add-form" onsubmit="submitAddProduct(event)">
      <div class="form-group">
        <label>Название товара *</label>
        <input type="text" name="name" placeholder="Например: AMD Ryzen 5 7600X" required>
      </div>
      <div class="form-group">
        <label>Категория *</label>
        <select name="category" required>
          <option value="">— Выберите категорию —</option>
          <option value="Процессор">Процессор</option>
          <option value="Материнская плата">Материнская плата</option>
          <option value="Оперативная память">Оперативная память</option>
          <option value="SSD">SSD</option>
          <option value="Охлаждение">Охлаждение</option>
          <option value="Корпус">Корпус</option>
          <option value="Блок питания">Блок питания</option>
        </select>
      </div>
      <div class="form-group">
        <label>Цена (₸) *</label>
        <input type="number" name="price" placeholder="Например: 75000" min="1" required>
      </div>
      <div class="form-group">
        <label>Описание</label>
        <textarea name="desc" placeholder="Краткое описание товара…"></textarea>
      </div>
      <div class="modal-btns">
        <button type="button" class="btn-outline" onclick="closeAddModal()">Отмена</button>
        <button type="submit" class="btn-add">Добавить</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
